[General]
mode = auto
variant = content
operation_mode = full
brightness_threshold = 120

[Paths]
templates_dir = templates
cache_dir = ~/.cache/m3-colors
config_dir = ~/.config/m3-colors

[Features]
set_wallpaper = false
apply_xresources = false
generate_palette_preview = true
run_post_script = true
create_symlink = true

[Hooks]
scripts_dir = ~/.config/m3-colors/hooks

[Hook.Scripts]
enabled = true
scripts = awww.sh, hyprland.sh, gtk-3.0.sh, gtk-3.20.sh, gtkrc.sh, gtk-4.0.sh

[PostScript]
script_path = m3wal-post.sh

