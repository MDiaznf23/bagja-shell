# #######################################################################################
# BAGJA-SHELL HYPRLAND CONFIG.
# #######################################################################################

source = ~/.config/hypr/colors_hyprland.conf

################
### MONITORS ###
################

monitor=,preferred,auto,auto

###################
### MY PROGRAMS ###
###################

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$browser = brave 

#################
### AUTOSTART ###
#################

exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP GDK_BACKEND QT_QPA_PLATFORM

exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

exec-once = dex --autostart --environment Hyprland

exec-once = ~/m3-colors-switch.sh
exec-once = awww-daemon
exec-once = sleep 1 && WALL=$(awww query 2>/dev/null | awk -F': ' '{print $NF}' | head -1) && warnaza "${WALL:-~/Pictures/Wallpapers/caelestia.png}"
exec-once = quickshell

exec-once = kbuildsycoca6 --noincremental
exec-once = /usr/bin/kded6

exec-once = /usr/lib/polkit-kde-authentication-agent-1

exec-once = /usr/lib/pam_kwallet_init
exec-once = systemctl --user start plasma-kwalletd6.service

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = XDG_MENU_PREFIX,arch-
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = XDG_CURRENT_DESKTOP,Hyprland
env = ELECTRON_OZONE_PLATFORM_HINT, wayland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

###################
### PERMISSIONS ###
###################

# Please note permission changes here require a Hyprland restart and are not applied on-the-fly for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    col.active_border = $active_border 45deg
    col.inactive_border = $inactive_border 45deg 
    resize_on_border = true

    allow_tearing = false
    layout = master
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 5
        passes = 2
        vibrancy = 0.1696
        new_optimizations = true
        ignore_opacity = false
    }

}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     4,     easeOutQuint, slide
    animation = workspacesIn,  1,     4,     easeOutQuint, slide
    animation = workspacesOut, 1,     4,     easeOutQuint, slide
    animation = zoomFactor,    1,     7,     quick
}

dwindle {
    pseudotile = true  
    preserve_split = true 
}

master {
    new_status = slave
}

misc {
    force_default_wallpaper = 0 
    disable_hyprland_logo = true 
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod SHIFT, B, exec, qs ipc call wallpaper toggle
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod SHIFT, W, exec, qs ipc call snapshotsession toggle
bind = $mainMod SHIFT, E, exec, qs ipc call powermenu display
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod, L, exec, qs ipc call lockscreen lock
bind = $mainMod SHIFT, F, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, V, resizeactive, exact 1300 680
bind = $mainMod, V, centerwindow, 1
bind = $mainMod, D, exec, qs ipc call launcher toggle
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, TAB, exec, qs ipc call workspaceoverview toggle

bind = $mainMod SHIFT, D, exec, hyprctl keyword general:layout dwindle
bind = $mainMod SHIFT, M, exec, hyprctl keyword general:layout master

bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# Screenshot fullscreen
bind = , Print, exec, grim ~/Pictures/Screenshots/screenshot_$(date +%Y%m%d_%H%M%S).png

# Screenshot area selection
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/screenshot_$(date +%Y%m%d_%H%M%S).png

# Screenshot + copy to clipboard
bind = $mainMod SHIFT, C, exec, grim -g "$(slurp)" - | wl-copy

bind = CTRL SUPER, left, workspace, e-1
bind = CTRL SUPER, right, workspace, e+1 

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = CTRL $mainMod, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%+ && qs ipc call osd open 
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%- && qs ipc call osd open
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+ && qs ipc call osd open
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%- && qs ipc call osd open

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################``
windowrule = match:class code, opacity 0.95 override 0.90 override

# Gwenview
windowrule = float on, pin on, size 960 540, center on, match:class org.kde.gwenview

# Haruna
windowrule = float on, size 1090 615, center on, match:class org.kde.haruna

# mpv
windowrule = float on, size 1090 615, center on, match:class mpv

# Ark
windowrule = float on, size 890 500, center on, match:class org.kde.ark

# Xdg-desktop-portal-gtk
windowrule = float on, size 890 500, center on, match:class xdg-desktop-portal-gtk

# AB Download Manager
windowrule = float on, center on, match:class com-abdownloadmanager-desktop-AppKt

# Audacious
windowrule = float on, size 550 410, center on, match:class audacious

windowrule = float on, match:class wine
windowrule = float on, match:title FL Studio

# Blur
windowrule = opacity 0.92 override 0.90 override, match:class org.kde.dolphin
windowrule = opacity 0.90 override 0.85 override, match:class pcmanfm
windowrule = opacity 0.90 override 0.85 override, match:class thunar
windowrule = opacity 0.90 override 0.85 override, match:class org.gnome.Nautilus

workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

